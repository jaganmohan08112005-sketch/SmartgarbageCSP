{% extends "base.html" %}
{% block title %}Report Illegal Dump - SmartGarbage{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-3">🛡️ Anonymous Dump Report</h3>
                <p class="text-center text-muted small">Your identity is never stored.</p>
                <form method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Location / Ward</label>
                        <input name="ward" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Photo</label>
                        <input type="file" name="photo" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Submit Report</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
