{% extends 'base.html' %}
{% block title %}MFA Verify - SmartGarbage{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow text-center">
            <div class="card-body p-4">
                <h3>🔐 MFA Verification</h3>
                <p class="text-muted">Enter the 6-digit code sent to your device.</p>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <input name="otp" type="text" class="form-control text-center fs-3 mb-3" maxlength="6" required placeholder="------">
                    <button type="submit" class="btn btn-success w-100">Verify</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
