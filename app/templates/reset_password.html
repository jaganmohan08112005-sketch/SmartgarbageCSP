{% extends 'base.html' %}
{% block title %}Reset Password - SmartGarbage{% endblock %}
{% block content %}
<div class="row justify-content-center animate-fade-in" style="margin-top: 5vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow border-0">
            <div class="text-center mb-4">
                <span class="fs-1 text-success">🔑</span>
                <h3 class="fw-bold mt-2 text-success">{{ _('Reset Password') }}</h3>
                <p class="text-muted small">{{ _('Enter your new password below.') }}</p>
            </div>
            <form method="POST" action="{{ url_for('main.reset_password', token=token) }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">{{ _('New Password') }}</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted">🔒</span>
                        <input name="password" type="password" class="form-control" placeholder="{{ _('Min. 6 characters') }}" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm mb-3">
                    {{ _('Update Password') }}
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
