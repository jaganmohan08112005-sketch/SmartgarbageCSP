{% extends 'base.html' %}
{% block title %}Request Password Reset - SmartGarbage{% endblock %}
{% block content %}
<div class="row justify-content-center animate-fade-in" style="margin-top: 5vh;">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 shadow border-0">
            <div class="text-center mb-4">
                <span class="fs-1 text-success">📧</span>
                <h3 class="fw-bold mt-2 text-success">{{ _('Reset Password') }}</h3>
                <p class="text-muted small">{{ _('Enter your username to receive a password reset link.') }}</p>
            </div>
            <form method="POST" action="{{ url_for('main.reset_password_request') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">{{ _('Username') }}</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light text-muted">👤</span>
                        <input name="username" class="form-control" placeholder="{{ _('Enter your username') }}" required autofocus>
                    </div>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-sm mb-3">
                    {{ _('Send Reset Link') }}
                </button>
            </form>
            <div class="text-center mt-3">
                <p class="mb-0 text-muted small">{{ _('Remember your password?') }} <a href="/login" class="text-success fw-bold text-decoration-none">{{ _('Log In Here') }}</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
