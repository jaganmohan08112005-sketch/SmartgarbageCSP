{% extends "base.html" %}
{% block title %}Firmware - SmartGarbage{% endblock %}
{% block content %}
<h3>OTA Firmware Management</h3>
<div class="card shadow">
    <div class="card-body p-4">
        <p class="text-muted">Push software updates to smart bins over Wi-Fi.</p>
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Firmware File</label>
                <input type="file" name="firmware" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Target Device ID</label>
                <input name="hardware_id" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Upload & Push</button>
        </form>
    </div>
</div>
{% endblock %}
