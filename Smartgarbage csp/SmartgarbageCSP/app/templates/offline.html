<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartGarbage — Offline</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f4f7f6; min-height: 100vh;
               display: flex; align-items: center; justify-content: center; margin: 0; }
        .card { max-width: 460px; background: #fff; border-radius: 16px; padding: 2rem;
                box-shadow: 0 10px 40px rgba(0,0,0,.08); text-align: center; }
        .icon { font-size: 3rem; }
        .actions a { display: block; margin: .5rem 0; padding: .75rem; border-radius: 12px;
                     background: #e8f8f5; color: #0f5132; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h3 class="fw-bold mt-2 mb-1">You're offline</h3>
        <p class="text-muted small">
            Spotty signal is normal in rural areas. Here's what you can still do — your
            actions will sync when you're back online.
        </p>
        <div class="actions mt-3">
            <a href="/report">📋 Draft a waste report</a>
            <a href="/schedule">📅 View collection schedule</a>
            <a href="/transparency">🏘️ Ward transparency</a>
            <a href="/">🏠 Go to home</a>
        </div>
        <p class="text-muted mt-3 mb-0 small" id="retry-hint">Tap reload to retry connection.</p>
    </div>
    <script>window.addEventListener('online', () => location.reload());</script>
</body>
</html>
